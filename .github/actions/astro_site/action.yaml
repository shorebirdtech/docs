name: Astro Site Workflow
description: Build and test Astro sites.

inputs:
  working_directory:
    required: false
    default: '.'
    description: The working directory for this workflow
  node_version:
    required: false
    default: '24.14.0'
    description: The node version to use.

runs:
  using: 'composite'
  steps:
    - name: ⚙️ Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node_version }}

    - name: ⬇️ Install Dependencies
      # --legacy-peer-deps: starlight-llms-txt@0.10.0 requires astro@^6, but we're on astro@7.
      # Remove once https://github.com/delucis/starlight-llms-txt/pull/127 is released.
      run: npm install --legacy-peer-deps && npx --no allow-scripts
      shell: ${{ inputs.shell }}
      working-directory: ${{ inputs.working_directory }}

    - name: ✨ Check Format
      run: npm run format:check
      shell: ${{ inputs.shell }}
      working-directory: ${{ inputs.working_directory }}

    - name: 📦 Build Site
      uses: withastro/action@v5
      with:
        path: ${{ inputs.working_directory }}
        node-version: ${{ inputs.node_version }}
