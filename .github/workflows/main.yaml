name: ci

on:
  schedule:
    - cron: '0 6 * * *' # 6am UTC / midnight CST — keeps roadmap data fresh
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    # Building on macos because pagefind cannot be installed on ubuntu-latest.
    # https://github.com/CloudCannon/pagefind/issues/574
    runs-on: macos-latest

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 📦 Build Docs
        uses: ./.github/actions/astro_site
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}

  deploy:
    needs: build

    # Deploying on macos because pagefind cannot be installed on ubuntu-latest.
    # https://github.com/CloudCannon/pagefind/issues/574
    runs-on: macos-latest

    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  spell-check:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/spell_check.yml@v1
    with:
      config: .cspell.yaml
      modified_files_only: false
