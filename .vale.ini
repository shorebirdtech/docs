StylesPath = .vale/styles
MinAlertLevel = warning
Vocab = Shorebird

[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = Shorebird, Vale
# Only Vale.Terms (the Vocab-driven proper-noun check) is wanted from the
# built-in Vale style; spell-checking is already handled by cspell.
Vale.Spelling = NO
Vale.Repetition = NO
# Vale.Terms runs at error severity by default. Downgraded to warning
# (non-blocking) because it doesn't respect code-fence exclusion the way
# custom scope:text rules do: it flags literal shell commands inside
# fenced code blocks (e.g. `shorebird release android`), and a TokenIgnores
# pattern matching one occurrence intermittently fails to suppress a
# *second* occurrence of the identical command elsewhere in the same file -
# a genuine Vale bug (verified with minimal repros), not a config mistake.
# Proper-noun capitalization is still reported, just doesn't block CI.
Vale.Terms = warning
# Known, permanent exceptions found while fixing every heading and proper
# noun in the docs (see PRs #579 and #583):
# - Shorebird.Headings: "vs"/"vs." is flagged unconditionally by Vale's
#   capitalization rule, regardless of surrounding text or the exceptions
#   list. Compound product/brand names (Azure Key Vault, GCP Cloud KMS, App
#   Store Connect, Firebase Remote Config, Launch Darkly, Hot Reload) and
#   three numbered-list headings kept as Title Case for consistency are
#   left as per-word exception matching breaks those phrases apart.
# - Vale.Terms: domains, an email address, a config filename mentioned two
#   different ways, a GitHub issue shorthand, and a file path placeholder.
# - Shorebird.Exclamation: a table row documenting the literal "[!]" symbol
#   from real `flutter doctor` output.
TokenIgnores = (\bvs\.?\b), (Azure Key Vault), (GCP Cloud KMS), \
  (App Store Connect), (Firebase Remote Config), (Launch Darkly), \
  (Hot Reload), (The Status Enum), (The Single State Class), (The Events), \
  (contact@shorebird\.dev), (console\.shorebird\.dev), \
  (download\.flutter\.dev), (shorebird\.yaml), (shorebird yaml), \
  (shorebirdtech/shorebird#\d+), (/path/to/flutter), (\[!\])
