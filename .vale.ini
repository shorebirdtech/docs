StylesPath = .vale/styles
MinAlertLevel = warning
Vocab = Shorebird

[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = Shorebird, Vale
# Only Vale.Terms (the Vocab-driven proper-noun check) is wanted from the
# built-in Vale style; spell-checking is already handled by cspell.
Vale.Spelling = NO
Vale.Repetition = NO
# Known, permanent exceptions to Shorebird.Headings, found while fixing every
# heading in the docs (see PR #583). Without these, the check can never go
# clean/blocking:
# - "vs"/"vs." is flagged unconditionally by Vale's capitalization rule,
#   regardless of surrounding text or exceptions-list entries.
# - Compound product/brand names where per-word exception matching breaks
#   down and partially-casing the phrase reads worse than Title Case.
TokenIgnores = (\bvs\.?\b), (Azure Key Vault), (GCP Cloud KMS), \
  (App Store Connect), (Firebase Remote Config), (Launch Darkly), \
  (Hot Reload), (The Status Enum), (The Single State Class), (The Events)
